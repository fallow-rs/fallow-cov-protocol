rules:
  # Dependabot auto-merge uses pull_request_target intentionally; no code
  # checkout, only a gh pr merge API call. Actor-gated to dependabot[bot].
  dangerous-triggers:
    ignore:
      - dependabot-auto-merge.yml
  # github.actor == 'dependabot[bot]' is the standard GitHub-documented pattern;
  # risk is mitigated by --auto (waits for required CI) and no code checkout.
  bot-conditions:
    ignore:
      - dependabot-auto-merge.yml
  # ci-ok job uses toJSON(needs.*.result), which only contains
  # success/failure/cancelled/skipped tokens; no untrusted user input.
  template-injection:
    ignore:
      - ci.yml
