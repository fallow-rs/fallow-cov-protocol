name: Dependabot auto-merge

on:
  pull_request_target:
    branches: [main]

permissions: {}

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # contents: write is required for the mergePullRequest GraphQL mutation
      # that backs `gh pr merge --auto`. pull-requests: write alone is not
      # enough; observed as `Resource not accessible by integration` failures
      # when contents was scoped down. Risk is bounded by the actor gate
      # (dependabot[bot] only) and by `--auto` waiting on required CI.
      contents: write
      pull-requests: write
    steps:
      - uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        id: meta
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge "$PR_URL" --auto --squash
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
